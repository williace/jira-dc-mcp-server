services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: jiradb
      POSTGRES_USER: jira
      POSTGRES_PASSWORD: jira
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jira"]
      interval: 10s
      timeout: 5s
      retries: 10

  jira:
    image: atlassian/jira-software:9.17
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ATL_JDBC_URL: "jdbc:postgresql://postgres:5432/jiradb"
      ATL_JDBC_USER: jira
      ATL_JDBC_PASSWORD: jira
      ATL_DB_DRIVER: "org.postgresql.Driver"
      ATL_DB_TYPE: postgres72
      JVM_MINIMUM_MEMORY: 1024m
      JVM_MAXIMUM_MEMORY: 2048m
      # Disable cloud-dependent features that can cause startup failures in Docker
      JVM_SUPPORT_RECOMMENDED_ARGS: "-Datlassian.darkfeature.jira.onboarding.feature.disabled=true"
    ports:
      - "8080:8080"
    volumes:
      - jiradata:/var/atlassian/application-data/jira
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/status"]
      interval: 30s
      timeout: 10s
      retries: 30
      start_period: 180s

  mcp-server:
    build:
      context: ../..
      dockerfile: Dockerfile
    depends_on:
      jira:
        condition: service_healthy
    environment:
      JIRA_BASE_URL: http://jira:8080
      # Basic auth with admin:admin — created by the setup wizard before this service starts
      JIRA_PAT: "BASIC:YWRtaW46YWRtaW4="
      TRANSPORT: http
      PORT: "3000"
    ports:
      - "3001:3000"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

volumes:
  pgdata:
  jiradata:
